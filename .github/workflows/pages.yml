name: Deploy Academy to Pages

# Regenerates the bilingual pages, assembles the deploy tree (R1 pages at / and
# /en/, shared assets at /artifacts/, CNAME), and publishes to GitHub Pages.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Generate bilingual pages
        run: node scripts/gen-site.mjs
      - name: Verify committed output is current
        run: git diff --exit-code site/
      - name: Run tests
        run: npm test
      - name: Assemble deploy tree
        run: node scripts/build-deploy.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _deploy
      - id: deployment
        uses: actions/deploy-pages@v4
